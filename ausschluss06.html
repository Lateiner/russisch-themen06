<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Logik-Check (Gemischt)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e67e22;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; font-size: 1.3rem; color: var(--primary-color); margin-bottom: 15px; }

        .instruction {
            background: #e3f2fd;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .exercise-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .group-card {
            background: #fafafa;
            border: 1px solid #eee;
            border-radius: 12px;
            padding: 15px;
            transition: all 0.3s;
        }

        .group-title {
            font-weight: bold;
            color: var(--primary-color);
            margin-bottom: 10px;
            display: block;
            font-size: 1rem;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 10px;
        }

        .option-btn {
            background: white;
            border: 2px solid #bdc3c7;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            font-size: 1rem;
            transition: all 0.2s;
            text-align: center;
            user-select: none;
        }

        .option-btn:hover { border-color: var(--accent-color); background: #f0f7ff; }

        /* Zustände */
        .option-btn.correct { background: var(--success-color) !important; color: white !important; border-color: var(--success-color) !important; }
        .option-btn.wrong { background: var(--error-color) !important; color: white !important; border-color: var(--error-color) !important; }
        .option-btn.disabled { pointer-events: none; opacity: 0.7; }

        .group-card.solved { border-color: var(--success-color); background-color: #f1f8e9; }

        /* Footer */
        .footer {
            margin-top: 30px;
            display: flex;
            gap: 12px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            color: white;
        }

        .btn-reset { background: #95a5a6; }
        .btn-solution { background: var(--primary-color); }

        @media (max-width: 500px) {
            .options-grid { grid-template-columns: 1fr 1fr; }
            .option-btn { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Logik: Wer passt nicht in die Gruppe?</h1>
    
    <div class="instruction">
        In jeder Reihe gibt es einen Begriff, der logisch nicht passt. Klicke auf den „Außenseiter“. <strong>Bei jedem Neustart werden die Fragen und Antworten neu gemischt!</strong>
    </div>

    <div id="exercise-list" class="exercise-list"></div>

    <div class="footer">
        <button class="control-btn btn-reset" onclick="resetGame()">Neustart</button>
        <button class="control-btn btn-solution" onclick="showSolution()">Lösung</button>
    </div>
</div>

<script>
    // Ursprüngliche Daten
    const originalData = [
        { group: "Stadt (город)", options: ["архитектор", "строитель", "повар", "инженер"], odd: "повар" },
        { group: "Schule (школа)", options: ["учитель", "директор", "официант", "учительница"], odd: "официант" },
        { group: "Universität (институт)", options: ["ректор", "декан", "медсестра", "преподаватель"], odd: "медсестра" },
        { group: "Restaurant (ресторан)", options: ["бариста", "повар", "полицейский", "официантка"], odd: "полицейский" },
        { group: "Büro (офис)", options: ["бухгалтер", "менеджер", "юрист", "парикмахер"], odd: "парикмахер" },
        { group: "Medizin (больница)", options: ["врач", "медбрат", "программист", "медсестра"], odd: "программист" },
        { group: "Theater (театр)", options: ["актёр", "режиссёр", "кассир", "художница"], odd: "кассир" },
        { group: "Geschäft (магазин)", options: ["продавец", "уборщица", "пожарный", "кассир"], odd: "пожарный" },
        { group: "Büro (офис)", options: ["начальник", "начальница", "директор", "певица"], odd: "певица" },
        { group: "Stadt (город)", options: ["полицейский", "пожарный", "инженер", "бариста"], odd: "бариста" }
    ];

    let currentSessionData = [];

    // Hilfsfunktion zum Mischen eines Arrays
    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
        return array;
    }

    function init() {
        const list = document.getElementById('exercise-list');
        list.innerHTML = '';

        // 1. Die Reihenfolge der Aufgaben mischen
        currentSessionData = shuffleArray([...originalData]);

        currentSessionData.forEach((item, idx) => {
            const card = document.createElement('div');
            card.className = 'group-card';
            card.id = `card-${idx}`;

            const title = document.createElement('span');
            title.className = 'group-title';
            title.textContent = `Aufgabe: ${item.group}`;

            const grid = document.createElement('div');
            grid.className = 'options-grid';

            // 2. Die Optionen innerhalb der Aufgabe mischen
            const shuffledOptions = shuffleArray([...item.options]);

            shuffledOptions.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.textContent = opt;
                btn.onclick = () => check(btn, opt, item.odd, idx);
                grid.appendChild(btn);
            });

            card.appendChild(title);
            card.appendChild(grid);
            list.appendChild(card);
        });
    }

    function check(btn, selected, correct, idx) {
        const card = document.getElementById(`card-${idx}`);
        const buttons = card.querySelectorAll('.option-btn');

        if (card.classList.contains('solved')) return;

        if (selected === correct) {
            btn.classList.add('correct');
            card.classList.add('solved');
            buttons.forEach(b => {
                if (b !== btn) b.classList.add('disabled');
            });
        } else {
            btn.classList.add('wrong');
            setTimeout(() => {
                if (!card.classList.contains('solved')) {
                    btn.classList.remove('wrong');
                }
            }, 800);
        }
    }

    function resetGame() {
        init(); // Mische alles neu
    }

    function showSolution() {
        currentSessionData.forEach((item, idx) => {
            const card = document.getElementById(`card-${idx}`);
            const buttons = card.querySelectorAll('.option-btn');
            
            card.classList.add('solved');
            buttons.forEach(btn => {
                if (btn.textContent === item.odd) {
                    btn.classList.add('correct');
                    btn.classList.remove('wrong');
                } else {
                    btn.classList.add('disabled');
                    btn.classList.remove('wrong');
                }
            });
        });
    }

    // Erster Start
    init();
</script>

</body>
</html>
