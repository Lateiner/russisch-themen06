<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Wahr oder Falsch? (Gender)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 700px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; font-size: 1.3rem; color: var(--primary-color); margin-bottom: 15px; }

        .instruction {
            background: #e8f5e9;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--success-color);
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .quiz-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .quiz-card {
            background: #fafafa;
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            transition: all 0.3s ease;
        }

        .statement {
            font-size: 1.15rem;
            font-weight: bold;
            color: var(--primary-color);
            text-align: center;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .answer-btn {
            flex: 1;
            max-width: 120px;
            padding: 10px;
            border: 2px solid var(--accent-color);
            background: white;
            color: var(--accent-color);
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s;
        }

        .answer-btn:hover { background: #ebf5fb; }

        /* Zustandsfarben */
        .quiz-card.correct-bg { background-color: #e8f5e9; border-color: var(--success-color); }
        .quiz-card.wrong-bg { background-color: #ffebee; border-color: var(--error-color); }

        .answer-btn.selected-correct { background-color: var(--success-color); color: white; border-color: var(--success-color); }
        .answer-btn.selected-wrong { background-color: var(--error-color); color: white; border-color: var(--error-color); }
        .answer-btn.disabled { opacity: 0.5; pointer-events: none; }

        .explanation {
            font-size: 0.85rem;
            font-style: italic;
            text-align: center;
            display: none;
            color: #555;
        }

        .quiz-card.solved .explanation { display: block; }

        /* Footer */
        .footer {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .control-btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            color: white;
        }

        .btn-reset { background: #95a5a6; }
        .btn-solution { background: var(--primary-color); }

        @media (max-width: 500px) {
            .statement { font-size: 1rem; }
            .answer-btn { font-size: 0.9rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Wahr oder Falsch? (Richtiges Gender)</h1>
    
    <div class="instruction">
        Kann man diese Sätze im Russischen so sagen? Entscheide per Klick auf <strong>Ja</strong> oder <strong>Nein</strong>. Achte besonders darauf, welche Berufe für beide Geschlechter offen sind.
    </div>

    <div id="quiz-list" class="quiz-list">
        <!-- JS generiert die 10 Fragen -->
    </div>

    <div class="footer">
        <button class="control-btn btn-reset" onclick="resetGame()">Neustart</button>
        <button class="control-btn btn-solution" onclick="showSolution()">Lösung</button>
    </div>
</div>

<script>
    const questions = [
        { text: "Она учитель.", isCorrect: true, info: "Richtig. 'Учитель' kann für beide Geschlechter stehen." },
        { text: "Он учительница.", isCorrect: false, info: "Falsch. 'Учительница' ist ausschließlich weiblich." },
        { text: "Она врач.", isCorrect: true, info: "Richtig. 'Врач' hat keine eigene weibliche Form." },
        { text: "Он актриса.", isCorrect: false, info: "Falsch. Ein Mann ist ein 'Актёр'." },
        { text: "Она официант.", isCorrect: true, info: "Richtig. Die Berufsbezeichnung kann neutral verwendet werden." },
        { text: "Она официантка.", isCorrect: true, info: "Richtig. Das ist die spezifisch weibliche Form." },
        { text: "Он медсестра.", isCorrect: false, info: "Falsch. Für Männer sagt man 'Медбрат'." },
        { text: "Она директор.", isCorrect: true, info: "Richtig. 'Директор' wird für Männer und Frauen genutzt." },
        { text: "Он певица.", isCorrect: false, info: "Falsch. Ein Mann ist ein 'Певец'." },
        { text: "Она менеджер.", isCorrect: true, info: "Richtig. Das Wort bleibt für beide gleich." }
    ];

    function init() {
        const list = document.getElementById('quiz-list');
        list.innerHTML = '';

        questions.forEach((q, idx) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.id = `card-${idx}`;

            const statement = document.createElement('div');
            statement.className = 'statement';
            statement.textContent = `${idx + 1}. „${q.text}“`;

            const btnGroup = document.createElement('div');
            btnGroup.className = 'btn-group';

            const jaBtn = document.createElement('button');
            jaBtn.className = 'answer-btn';
            jaBtn.textContent = 'Ja';
            jaBtn.onclick = () => check(idx, true);

            const neinBtn = document.createElement('button');
            neinBtn.className = 'answer-btn';
            neinBtn.textContent = 'Nein';
            neinBtn.onclick = () => check(idx, false);

            const explanation = document.createElement('div');
            explanation.className = 'explanation';
            explanation.textContent = q.info;

            btnGroup.appendChild(jaBtn);
            btnGroup.appendChild(neinBtn);
            card.appendChild(statement);
            card.appendChild(btnGroup);
            card.appendChild(explanation);
            list.appendChild(card);
        });
    }

    function check(idx, userChoice) {
        const q = questions[idx];
        const card = document.getElementById(`card-${idx}`);
        const buttons = card.querySelectorAll('.answer-btn');

        if (card.classList.contains('solved')) return;

        card.classList.add('solved');
        buttons.forEach(btn => btn.classList.add('disabled'));

        const isUserCorrect = (userChoice === q.isCorrect);
        const selectedBtn = userChoice ? buttons[0] : buttons[1];

        if (isUserCorrect) {
            card.classList.add('correct-bg');
            selectedBtn.classList.add('selected-correct');
        } else {
            card.classList.add('wrong-bg');
            selectedBtn.classList.add('selected-wrong');
        }
    }

    function resetGame() {
        init();
    }

    function showSolution() {
        questions.forEach((q, idx) => {
            const card = document.getElementById(`card-${idx}`);
            const buttons = card.querySelectorAll('.answer-btn');
            
            if (!card.classList.contains('solved')) {
                card.classList.add('solved');
                buttons.forEach(btn => btn.classList.add('disabled'));
                const correctBtn = q.isCorrect ? buttons[0] : buttons[1];
                correctBtn.classList.add('selected-correct');
                card.classList.add('correct-bg');
            }
        });
    }

    init();
</script>

</body>
</html>
