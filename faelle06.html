<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Fall-Identifikation</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e67e22;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        h1 { text-align: center; font-size: 1.3rem; color: var(--primary-color); }

        .instruction {
            background: #fff3e0;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #ff9800;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .sentence-grid {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .sentence-card {
            padding: 15px;
            background: #fff;
            border: 2px solid #edf2f7;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.1rem;
            transition: all 0.2s ease;
            user-select: none;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .sentence-card:hover { border-color: var(--accent-color); background: #f8f9fa; }

        /* Zustände */
        .sentence-card.correct {
            background-color: #e8f5e9;
            border-color: var(--success-color);
            color: var(--success-color);
            font-weight: bold;
        }

        .sentence-card.wrong {
            background-color: #fff3e0;
            border-color: var(--error-color);
            color: var(--error-color);
        }

        .icon { font-size: 1.2rem; font-weight: bold; }

        /* Footer */
        .footer {
            margin-top: 30px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        button {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.9rem;
        }

        .btn-reset { background: #95a5a6; color: white; }
        .btn-solution { background: var(--primary-color); color: white; }

        @media (max-width: 500px) {
            .sentence-card { font-size: 1rem; padding: 12px; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Fälle erkennen: Wer ist im Nominativ?</h1>
    
    <div class="instruction">
        Klicke in der Liste nur die Sätze an, die den <strong>Nominativ (Fall 1)</strong> verwenden. Sätze mit „работаю“ stehen im Instrumental und sind hier nicht gesucht. Direktes Feedback beim Anklicken!
    </div>

    <div class="sentence-grid" id="sentence-grid">
        <!-- JS generiert die Sätze -->
    </div>

    <div class="footer">
        <button class="btn-reset" onclick="resetGame()">Neustart</button>
        <button class="btn-solution" onclick="showSolution()">Lösung</button>
    </div>
</div>

<script>
    const sentences = [
        { text: "Я учитель", isNom: true },
        { text: "Я работаю учителем", isNom: false },
        { text: "Я актриса", isNom: true },
        { text: "Я работаю актрисой", isNom: false },
        { text: "Я повар", isNom: true },
        { text: "Я работаю поваром", isNom: false },
        { text: "Я менеджер", isNom: true },
        { text: "Я работаю менеджером", isNom: false },
        { text: "Я медсестра", isNom: true },
        { text: "Я работаю медсестрой", isNom: false },
        { text: "Я директор", isNom: true },
        { text: "Я работаю директором", isNom: false },
        { text: "Я программист", isNom: true },
        { text: "Я работаю программистом", isNom: false },
        { text: "Я официант", isNom: true },
        { text: "Я работаю официантом", isNom: false },
        { text: "Я парикмахер", isNom: true },
        { text: "Я работаю парикмахером", isNom: false },
        { text: "Я инженер", isNom: true },
        { text: "Я работаю инженером", isNom: false }
    ];

    function init() {
        const grid = document.getElementById('sentence-grid');
        grid.innerHTML = '';
        
        // Zufällige Mischung der Sätze
        const shuffled = [...sentences].sort(() => Math.random() - 0.5);

        shuffled.forEach((s, idx) => {
            const card = document.createElement('div');
            card.className = 'sentence-card';
            card.textContent = s.text;
            
            card.onclick = () => {
                if (card.classList.contains('correct') || card.classList.contains('wrong')) return;

                if (s.isNom) {
                    card.classList.add('correct');
                    card.innerHTML += ' <span class="icon">✓</span>';
                } else {
                    card.classList.add('wrong');
                    card.innerHTML += ' <span class="icon">✗</span>';
                }
            };
            
            card.dataset.isNom = s.isNom;
            grid.appendChild(card);
        });
    }

    function resetGame() {
        init();
    }

    function showSolution() {
        const cards = document.querySelectorAll('.sentence-card');
        cards.forEach(card => {
            const isNom = card.dataset.isNom === "true";
            if (isNom) {
                card.className = 'sentence-card correct';
                if (!card.innerHTML.includes('✓')) card.innerHTML += ' <span class="icon">✓</span>';
            } else {
                card.className = 'sentence-card'; // Andere zurücksetzen oder neutral lassen
                card.style.opacity = "0.5";
            }
        });
    }

    init();
</script>

</body>
</html>
