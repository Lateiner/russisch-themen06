<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Russisch Übung: Suchbild Im Büro (mit Namen)</title>
    <style>
        :root {
            --primary-color: #2c3e50;
            --accent-color: #3498db;
            --success-color: #27ae60;
            --error-color: #e74c3c;
            --bg-color: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 10px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            text-align: center;
        }

        h1 { font-size: 1.3rem; color: var(--primary-color); margin-bottom: 10px; }

        .instruction {
            background: #e1f5fe;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid var(--accent-color);
            font-size: 0.9rem;
            text-align: left;
        }

        /* Das Büro-Layout */
        .office-floor {
            width: 100%;
            height: 450px;
            background: #ecf0f1;
            border: 3px solid #bdc3c7;
            border-radius: 10px;
            position: relative;
            margin-bottom: 20px;
            background-image: radial-gradient(#bdc3c7 1px, transparent 1px);
            background-size: 30px 30px;
        }

        /* Die Personen-Container */
        .person-container {
            position: absolute;
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 80px; /* Platz für den Namen unter dem Bild */
        }

        .person-spot {
            width: 45px;
            height: 45px;
            background: white;
            border: 2px solid var(--accent-color);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s;
            z-index: 5;
        }

        .person-spot:hover { transform: scale(1.1); }
        .person-spot.correct { border-color: var(--success-color); background: #e8f5e9; }

        /* Die Namens-Labels */
        .job-label {
            margin-top: 5px;
            font-size: 0.75rem;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.9);
            padding: 2px 4px;
            border-radius: 4px;
            color: var(--success-color);
            display: none; /* Erst bei Korrekt/Lösung zeigen */
            white-space: nowrap;
            border: 1px solid var(--success-color);
        }

        .person-container.solved .job-label { display: block; }

        /* Pop-up Menü */
        #popover {
            position: absolute;
            background: white;
            border: 2px solid var(--primary-color);
            border-radius: 8px;
            padding: 10px;
            display: none;
            flex-direction: column;
            gap: 5px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 100;
        }

        .popover-btn {
            background: var(--accent-color);
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: bold;
        }

        /* Footer */
        .footer { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
        .control-btn { padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; color: white; }
        .btn-reset { background: #95a5a6; }
        .btn-solution { background: var(--primary-color); }

        @media (max-width: 600px) {
            .office-floor { height: 500px; }
            .person-spot { width: 38px; height: 38px; font-size: 1.3rem; }
            .job-label { font-size: 0.65rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Büro-Suche: Wer ist wer?</h1>
    
    <div class="instruction">
        Tippe auf eine Person und wähle den richtigen Beruf aus. Bei richtiger Antwort (oder Klick auf „Lösung“) erscheint der russische Name unter dem Bild.
    </div>

    <div class="office-floor" id="office">
        <!-- 10 Personen-Container -->
        <div class="person-container" style="top: 5%; left: 5%;">
            <div class="person-spot" data-correct="начальник" data-opts="начальник,повар,врач">👨‍💼</div>
            <div class="job-label">начальник</div>
        </div>
        <div class="person-container" style="top: 5%; right: 5%;">
            <div class="person-spot" data-correct="начальница" data-opts="начальница,актриса,медсестра">👩‍💼</div>
            <div class="job-label">начальница</div>
        </div>
        <div class="person-container" style="top: 35%; left: 15%;">
            <div class="person-spot" data-correct="программист" data-opts="программист,учитель,бариста">👨‍💻</div>
            <div class="job-label">программист</div>
        </div>
        <div class="person-container" style="top: 35%; right: 15%;">
            <div class="person-spot" data-correct="менеджер" data-opts="менеджер,официант,водитель">🤝</div>
            <div class="job-label">менеджер</div>
        </div>
        <div class="person-container" style="bottom: 15%; left: 10%;">
            <div class="person-spot" data-correct="юрист" data-opts="юрист,строитель,художник">👨‍⚖️</div>
            <div class="job-label">юрист</div>
        </div>
        <div class="person-container" style="bottom: 15%; right: 10%;">
            <div class="person-spot" data-correct="бухгалтер" data-opts="бухгалтер,певец,декан">📊</div>
            <div class="job-label">бухгалтер</div>
        </div>
        <div class="person-container" style="top: 45%; left: 42%;">
            <div class="person-spot" data-correct="директор" data-opts="директор,ректор,кассир">💼</div>
            <div class="job-label">директор</div>
        </div>
        <div class="person-container" style="bottom: 40%; right: 2%;">
            <div class="person-spot" data-correct="уборщица" data-opts="уборщица,начальница,певица">🧹</div>
            <div class="job-label">уборщица</div>
        </div>
        <div class="person-container" style="bottom: 5%; left: 42%;">
            <div class="person-spot" data-correct="охранник" data-opts="охранник,инженер,пожарный">🛡️</div>
            <div class="job-label">охранник</div>
        </div>
        <div class="person-container" style="top: 25%; left: 42%;">
            <div class="person-spot" data-correct="менеджер" data-opts="менеджер,юрист,врач">📞</div>
            <div class="job-label">менеджер</div>
        </div>
    </div>

    <div id="popover"></div>

    <div class="footer">
        <button class="control-btn btn-reset" onclick="resetGame()">Neustart</button>
        <button class="control-btn btn-solution" onclick="showSolution()">Lösung</button>
    </div>
</div>

<script>
    const office = document.getElementById('office');
    const popover = document.getElementById('popover');
    let activeSpot = null;
    let activeContainer = null;

    document.querySelectorAll('.person-spot').forEach(spot => {
        spot.onclick = (e) => {
            const container = spot.parentElement;
            if (container.classList.contains('solved')) return;
            
            activeSpot = spot;
            activeContainer = container;
            const opts = spot.dataset.opts.split(',');
            const rect = spot.getBoundingClientRect();
            const officeRect = office.getBoundingClientRect();

            popover.innerHTML = '';
            opts.sort(() => Math.random() - 0.5).forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'popover-btn';
                btn.textContent = opt;
                btn.onclick = () => checkChoice(opt);
                popover.appendChild(btn);
            });

            popover.style.display = 'flex';
            popover.style.top = (rect.top - officeRect.top + 50) + 'px';
            popover.style.left = (rect.left - officeRect.left) + 'px';
            
            if (parseInt(popover.style.left) > officeRect.width - 120) {
                popover.style.left = (officeRect.width - 130) + 'px';
            }

            e.stopPropagation();
        };
    });

    function checkChoice(choice) {
        if (choice === activeSpot.dataset.correct) {
            activeSpot.classList.add('correct');
            activeContainer.classList.add('solved');
            popover.style.display = 'none';
        } else {
            activeSpot.style.borderColor = 'var(--error-color)';
            setTimeout(() => {
                if (!activeContainer.classList.contains('solved')) {
                    activeSpot.style.borderColor = 'var(--accent-color)';
                }
            }, 500);
        }
    }

    document.addEventListener('click', () => { popover.style.display = 'none'; });

    function resetGame() {
        document.querySelectorAll('.person-container').forEach(c => {
            c.classList.remove('solved');
            const spot = c.querySelector('.person-spot');
            spot.classList.remove('correct');
            spot.style.borderColor = 'var(--accent-color)';
        });
        popover.style.display = 'none';
    }

    function showSolution() {
        document.querySelectorAll('.person-container').forEach(c => {
            c.classList.add('solved');
            c.querySelector('.person-spot').classList.add('correct');
        });
        popover.style.display = 'none';
    }
</script>

</body>
</html>
